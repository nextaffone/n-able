<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyNextaff — Profile Test</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #001f4e;
    font-family: 'Barlow', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 48px 56px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: #0a3d8f;
    border: 3px solid #E87722;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 800;
    color: #E87722;
    margin: 0 auto 24px;
  }
  .greeting { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: #E87722; margin-bottom: 8px; }
  .name { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 32px; }
  .fields { display: flex; flex-direction: column; gap: 12px; text-align: left; }
  .field { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px 16px; display: flex; flex-direction: column; gap: 3px; }
  .field-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #E87722; }
  .field-value { font-size: 15px; font-weight: 500; color: #fff; }
  .sign-in-btn { margin-top: 28px; background: #E87722; color: #fff; border: none; border-radius: 8px; padding: 14px 32px; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; width: 100%; transition: background 0.15s ease; }
  .sign-in-btn:hover { background: #f5a04a; }
  .sign-in-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status-msg { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.4); font-style: italic; }
</style>
</head>
<body>
<div class="card">
  <div class="avatar" id="avatar">MN</div>
  <div class="greeting" id="greeting">Welcome to Nextaff</div>
  <div class="name" id="name">Sign In Required</div>
  <div class="fields">
    <div class="field"><div class="field-label">Email Address</div><div class="field-value" id="email">—</div></div>
    <div class="field"><div class="field-label">Office / Location</div><div class="field-value" id="office">—</div></div>
    <div class="field"><div class="field-label">Job Title</div><div class="field-value" id="title">—</div></div>
  </div>
  <button class="sign-in-btn" id="signInBtn" onclick="signIn()">Sign in with Microsoft</button>
  <div class="status-msg" id="statusMsg"></div>
</div>

<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script>
  const hour = new Date().getHours();
  const greetingText = hour < 12 ? "Good Morning" : hour < 17 ? "Good Afternoon" : "Good Evening";

  function getInitials(name) {
    return name.split(" ").filter(Boolean).map(function(n){ return n[0]; }).join("").toUpperCase().slice(0,2);
  }

  function populateUI(profile) {
    var fullName = profile.displayName || "Unknown";
    document.getElementById("greeting").textContent = greetingText;
    document.getElementById("name").textContent = fullName;
    document.getElementById("avatar").textContent = getInitials(fullName);
    document.getElementById("email").textContent = profile.mail || profile.userPrincipalName || "Not available";
    document.getElementById("office").textContent = profile.officeLocation || "Not set";
    document.getElementById("title").textContent = profile.jobTitle || "Not set";
    document.getElementById("signInBtn").style.display = "none";
    document.getElementById("statusMsg").textContent = "";
  }

  async function signIn() {
    var btn = document.getElementById("signInBtn");
    var msg = document.getElementById("statusMsg");
    btn.disabled = true;
    msg.textContent = "Opening Microsoft sign-in...";

    try {
      var msalInstance = new msal.PublicClientApplication({
        auth: {
          clientId: "6c88bf12-eb55-40ec-9a7d-328154c6e372",
          authority: "https://login.microsoftonline.com/75d2359e-494b-4009-9a6b-263e04d7744e",
          redirectUri: "https://nextaffone.github.io/n-able/profile-test.html"
        },
        cache: { cacheLocation: "sessionStorage" }
      });

      await msalInstance.initialize();

      var result = await msalInstance.loginPopup({ scopes: ["User.Read"] });

      var res = await fetch("https://graph.microsoft.com/v1.0/me?$select=displayName,mail,userPrincipalName,officeLocation,jobTitle", {
        headers: { "Authorization": "Bearer " + result.accessToken }
      });

      var profile = await res.json();
      populateUI(profile);

    } catch(e) {
      msg.textContent = "Sign-in failed: " + e.message;
      btn.disabled = false;
      console.error(e);
    }
  }
</script>
</body>
</html>

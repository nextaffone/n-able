<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascension — Recruitment Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #f0f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 680px;
    background: #ffffff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,32,80,0.15);
    display: flex;
    flex-direction: column;
    height: 680px;
  }

  /* Header */
  .chat-header {
    background: #002855;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .bot-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #E87722;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }

  .chat-header-info { flex: 1; }

  .chat-header-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: #ffffff;
  }

  .chat-header-sub {
    font-size: 11px; color: #8baac8;
    margin-top: 1px;
  }

  .online-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: #8baac8;
  }

  .online-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.7);
  }

  /* Messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #f8fafc;
  }

  /* Message bubbles */
  .msg { display: flex; gap: 10px; align-items: flex-end; animation: msgIn 0.25s ease both; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }

  .msg.bot .msg-avatar { background: #002855; color: #E87722; }
  .msg.user .msg-avatar { background: #E87722; color: #fff; }

  .msg-bubble {
    max-width: 72%;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
  }

  .msg.bot .msg-bubble {
    background: #ffffff;
    border: 1px solid #dde7f0;
    border-bottom-left-radius: 4px;
    color: #1a2f4a;
    box-shadow: 0 1px 4px rgba(0,32,80,0.06);
  }

  .msg.user .msg-bubble {
    background: #002855;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: #a0b4c8;
    margin-top: 4px;
    text-align: right;
  }

  .msg.bot .msg-time { text-align: left; padding-left: 40px; }
  .msg.user .msg-time { text-align: right; padding-right: 40px; }

  /* Typing indicator */
  .typing { display: flex; gap: 10px; align-items: flex-end; }
  .typing-bubble {
    background: #ffffff;
    border: 1px solid #dde7f0;
    border-radius: 14px; border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex; gap: 4px; align-items: center;
    box-shadow: 0 1px 4px rgba(0,32,80,0.06);
  }
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #8baac8;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Suggestion buttons */
  .suggestions {
    padding: 12px 16px;
    background: #ffffff;
    border-top: 1px solid #dde7f0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex-shrink: 0;
  }

  .suggestions-label {
    width: 100%;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #8baac8;
    margin-bottom: 2px;
  }

  .suggestion-btn {
    background: #f0f4f8;
    border: 1px solid #dde7f0;
    border-radius: 20px;
    padding: 7px 14px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px; font-weight: 600;
    color: #002855;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
  }

  .suggestion-btn:hover {
    background: #002855;
    border-color: #002855;
    color: #ffffff;
  }

  .suggestion-btn.orange {
    background: rgba(232,119,34,0.08);
    border-color: rgba(232,119,34,0.3);
    color: #E87722;
  }

  .suggestion-btn.orange:hover {
    background: #E87722;
    border-color: #E87722;
    color: #ffffff;
  }

  /* Reset button */
  .chat-footer {
    padding: 10px 16px;
    background: #f8fafc;
    border-top: 1px solid #dde7f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .footer-note { font-size: 11px; color: #a0b4c8; font-style: italic; }

  .reset-btn {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #8baac8;
    background: none; border: none;
    cursor: pointer;
    transition: color 0.15s;
  }

  .reset-btn:hover { color: #E87722; }

  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dde7f0; border-radius: 2px; }
</style>
</head>
<body>

<div class="chat-wrapper">

  <div class="chat-header">
    <div class="bot-avatar">A</div>
    <div class="chat-header-info">
      <div class="chat-header-name">Ascension Recruitment Guide</div>
      <div class="chat-header-sub">VMS Process Assistant · Nextaff</div>
    </div>
    <div class="online-badge">
      <div class="online-dot"></div>
      Online
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="suggestions" id="suggestions"></div>

  <div class="chat-footer">
    <div class="footer-note">Select a question above to continue</div>
    <button class="reset-btn" onclick="resetChat()">↺ Start Over</button>
  </div>

</div>

<script>
  // ── Conversation tree ──
  const tree = {
    start: {
      bot: "Hi! I'm your Ascension Recruitment Process guide. What would you like to know about?",
      options: [
        { label: "🔄 Walk me through the full process", next: "full_process" },
        { label: "👤 What does the Recruiter do?", next: "recruiter_role" },
        { label: "📋 What does the Account Manager do?", next: "am_role" },
        { label: "🏥 What is Centralized Onboarding?", next: "onboarding_role" },
        { label: "📤 How do I submit a candidate?", next: "submittal" },
      ]
    },
    full_process: {
      bot: "The Ascension recruitment process has 6 stages:\n\n1️⃣ Sourcing\n2️⃣ Screening\n3️⃣ Submittal\n4️⃣ Credentialing & Onboarding\n5️⃣ Placement\n6️⃣ Engagement\n\nEach stage has a specific owner. Which stage would you like to explore?",
      options: [
        { label: "1️⃣ Sourcing", next: "sourcing" },
        { label: "2️⃣ Screening", next: "screening" },
        { label: "3️⃣ Submittal", next: "submittal" },
        { label: "4️⃣ Credentialing & Onboarding", next: "credentialing" },
        { label: "5️⃣ Placement", next: "placement" },
        { label: "6️⃣ Engagement", next: "engagement" },
      ]
    },
    sourcing: {
      bot: "During Sourcing:\n\n🔴 Recruiter — Finds new candidates\n🔵 Account Manager — Collects applications and information\n🟡 Centralized Onboarding — Schedules the initial interview",
      options: [
        { label: "Next: Screening →", next: "screening" },
        { label: "← Back to all stages", next: "full_process" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    screening: {
      bot: "During Screening:\n\n🔴 Recruiter — Runs automated pre-screening\n🔵 Account Manager — Conducts the initial interview\n🟡 Centralized Onboarding — Reviews roles and requests submission documents",
      options: [
        { label: "Next: Submittal →", next: "submittal" },
        { label: "← Back to Sourcing", next: "sourcing" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    submittal: {
      bot: "During Submittal:\n\n🔴 Recruiter — Compiles the submission in Avionte\n🔵 Account Manager — Leads a review call on the submission\n🟡 Centralized Onboarding — Uploads the submission to Hallmark",
      options: [
        { label: "How do I compile in Avionte?", next: "avionte" },
        { label: "Next: Credentialing →", next: "credentialing" },
        { label: "← Back to Screening", next: "screening" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    avionte: {
      bot: "To compile a submission in Avionte:\n\n1. Pull the candidate profile\n2. Attach all required documents (resume, skills checklist, certifications)\n3. Verify the position and shift details match the Ascension req\n4. Submit through the VMS — Hallmark for Ascension\n\nMake sure your docs are clean before submitting — incomplete packages slow down the process.",
      options: [
        { label: "What docs are required?", next: "required_docs" },
        { label: "Next: Credentialing →", next: "credentialing" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    required_docs: {
      bot: "Required documents for an Ascension submission typically include:\n\n✅ Updated resume\n✅ Skills checklist (specialty-specific)\n✅ Core competencies\n✅ Active BLS certification\n✅ Specialty certifications (ICU, L&D, ER, etc.)\n✅ 2 professional references\n✅ Background check consent\n✅ Drug screen consent",
      options: [
        { label: "What certifications are needed by specialty?", next: "certs_by_specialty" },
        { label: "Next: Credentialing →", next: "credentialing" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    certs_by_specialty: {
      bot: "Certifications by specialty:\n\n🏥 Med-Surg — BLS, Pharmacology Exam, Med/Surg Exam\n❤️ ICU — BLS, EKG Exam, Specialty Checklist\n🔪 OR — BLS, Pharmacology Exam, Specialty Checklist\n🚨 ER — BLS, EKG Exam, Specialty Checklist\n🤱 L&D — BLS, Specialty Checklist\n📊 Stepdown — BLS, EKG Exam, Pharmacology Exam, Med/Surg Exam",
      options: [
        { label: "Next: Credentialing →", next: "credentialing" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    credentialing: {
      bot: "During Credentialing & Onboarding:\n\n🔴 Recruiter — Sends the credentialing workflow\n🔵 Account Manager — Submits credentialing for approval and confirms start date\n🟡 Centralized Onboarding — Launches onboarding documents\n\n⚡ Candidates must complete their onboarding packet within 48 hours.",
      options: [
        { label: "Next: Placement →", next: "placement" },
        { label: "← Back to Submittal", next: "submittal" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    placement: {
      bot: "During Placement:\n\n🔴 Recruiter — Submits talent for placement\n🔵 Account Manager — Starts talent on the job in BOLD\n🟡 Centralized Onboarding — Audits the file for compliance\n\nOnce the candidate is active in BOLD, they're officially placed.",
      options: [
        { label: "Next: Engagement →", next: "engagement" },
        { label: "← Back to Credentialing", next: "credentialing" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    engagement: {
      bot: "During Engagement (ongoing):\n\n🔴 Recruiter — Maintains ongoing talent engagement and relationship\n🔵 Account Manager — Provides support and service to the client\n🟡 Centralized Onboarding — Handles referrals and redeployments\n\nKeep candidates warm — redeployment is your fastest fill!",
      options: [
        { label: "← Back to Placement", next: "placement" },
        { label: "🔄 Start the process over", next: "full_process" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    recruiter_role: {
      bot: "The Recruiter owns the candidate relationship end to end:\n\n• Sourcing new candidates\n• Running automated pre-screening\n• Compiling submissions in Avionte\n• Sending credentialing workflows\n• Maintaining ongoing talent engagement\n• Submitting talent for placement\n\nYour job is to keep candidates warm and docs clean.",
      options: [
        { label: "📤 How do I submit a candidate?", next: "submittal" },
        { label: "📋 What does the AM do?", next: "am_role" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    am_role: {
      bot: "The Account Manager is the bridge between submission and start date:\n\n• Collects applications and information\n• Conducts the initial interview\n• Leads review calls on submissions\n• Submits credentialing for approval\n• Confirms start dates\n• Starts talent in BOLD\n• Provides ongoing client support",
      options: [
        { label: "👤 What does the Recruiter do?", next: "recruiter_role" },
        { label: "🏥 What is Centralized Onboarding?", next: "onboarding_role" },
        { label: "🏠 Main menu", next: "start" },
      ]
    },
    onboarding_role: {
      bot: "Centralized Onboarding handles the backend that keeps everything compliant:\n\n• Schedules initial interviews\n• Reviews roles and requests submission documents\n• Uploads packages to Hallmark\n• Launches onboarding documents\n• Audits files for compliance\n• Manages referrals and redeployments\n\nThey work behind the scenes so you don't have to.",
      options: [
        { label: "👤 What does the Recruiter do?", next: "recruiter_role" },
        { label: "📋 What does the AM do?", next: "am_role" },
        { label: "🏠 Main menu", next: "start" },
      ]
    }
  };

  let currentNode = "start";
  const messagesEl = document.getElementById("chatMessages");
  const suggestionsEl = document.getElementById("suggestions");

  function getTime() {
    return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function addBotMessage(text) {
    const msg = document.createElement("div");
    msg.className = "msg bot";
    msg.innerHTML = `
      <div class="msg-avatar">A</div>
      <div>
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
      </div>
    `;
    messagesEl.appendChild(msg);
    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = getTime();
    messagesEl.appendChild(time);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addUserMessage(text) {
    const msg = document.createElement("div");
    msg.className = "msg user";
    msg.innerHTML = `
      <div class="msg-avatar">ME</div>
      <div>
        <div class="msg-bubble">${text}</div>
      </div>
    `;
    messagesEl.appendChild(msg);
    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = getTime();
    messagesEl.appendChild(time);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.id = "typingIndicator";
    typing.innerHTML = `
      <div class="msg-avatar bot-avatar" style="width:30px;height:30px;border-radius:50%;background:#002855;color:#E87722;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">A</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messagesEl.appendChild(typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }

  function renderSuggestions(options) {
    suggestionsEl.innerHTML = '<div class="suggestions-label">Choose a question</div>';
    options.forEach(function(opt) {
      const btn = document.createElement("button");
      btn.className = "suggestion-btn" + (opt.next === "start" ? " orange" : "");
      btn.textContent = opt.label;
      btn.onclick = function() { selectOption(opt.label, opt.next); };
      suggestionsEl.appendChild(btn);
    });
  }



  function resetChat() {
    messagesEl.innerHTML = '';
    suggestionsEl.innerHTML = '';
    currentNode = "start";
    init();
  }

  function init() {
    messagesEl.innerHTML = '';
    suggestionsEl.innerHTML = '';
    addBotMessage(tree.start.bot);
    renderSuggestions(tree.start.options);
  }

  function selectOption(label, next) {
    addUserMessage(label);
    suggestionsEl.innerHTML = '';
    currentNode = next;
    showTyping();
    setTimeout(function() {
      removeTyping();
      var node = tree[next];
      if (node) {
        addBotMessage(node.bot);
        renderSuggestions(node.options);
      }
    }, 600);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>

</body>
</html>
